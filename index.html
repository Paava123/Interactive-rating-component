<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>

<script defer src="script.js"></script>
 <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-cont" id="main">
  <div class="star"><img src="images/icon-star.svg" alt="star"></div>
<h1 class="how">
  How did we do?
</h1>
<h1 class="text">
  Please let us know how we did with your support request. All feedback is appreciated 
  to help us improve our offering!
</h1>
<div class="buttons">
<button class="rating" onclick="Rate(1)" id="1">
  1 
  </button>
  <button class="rating" onclick="Rate(2)" id="2">
  2 
  </button>
  <button class="rating" onclick="Rate(3)" id="3">
  3 
  </button>
  <button class="rating" onclick="Rate(4)" id="4">
  4 
  </button>
  <button class="rating" onclick="Rate(5)" id="5">
  5
  </button>
  </div>
<button onclick="Submit()" class="submit">
  Submit
</button>
  </div>

  <!-- Rating state end -->

  <!-- Thank you state start -->
<div class="hidden state" id="state">

  <img src="images/illustration-thank-you.svg" alt="thank you">

  <h1 id="rating" class="rateeeee"> Pls select a score next time =( </h1>

 <h1 class="how centralize"> Thank you! </h1>

 <h1 class="text centralize"> We appreciate you taking the time to give a rating. If you ever need more support, 
  don’t hesitate to get in touch! </h1>

  <!-- Thank you state end -->
</div>



</body>
</html>
